name: hotfix
description: Emergency production fix — skip BA, minimal footprint, capped cost.
match:
  arguments_pattern: "\\bhotfix\\b|\\burgent\\b|\\bemergency\\b|\\bprod(uction)?\\s+fix\\b"
  loc_touched_max: 200
caps:
  max_total_cost_usd: 0.60
phases:
  - development
  - qa
  - security
  - documentation
