patterns:
  - rule_name: node_child_process_exec
    regex: "(?:child_process|require\\(['\"]child_process['\"]\\)).*\\.exec\\s*\\("
    paths: ["**/*.js", "**/*.ts", "**/*.mjs"]
    reminder: "child_process.exec() passes input through a shell — vulnerable to injection. Use execFile() or spawn() with an args array and no shell option."

  - rule_name: node_sql_string_concat
    regex: "(?:query|execute|raw)\\s*\\([^)]*(?:\\+|\\$\\{)[^)]*(?:req\\.|params\\.|body\\.|query\\.)"
    paths: ["**/*.js", "**/*.ts"]
    exclude_paths: ["**/*.test.*", "**/*.spec.*"]
    reminder: "SQL built by string concatenation/interpolation with request data enables SQL injection. Use parameterized queries or an ORM's query builder."

  - rule_name: node_unsafe_eval
    substrings: ["eval("]
    paths: ["**/*.js", "**/*.ts", "**/*.mjs"]
    exclude_paths: ["**/*.test.*", "**/*.spec.*", "**/webpack*", "**/rollup*", "**/vite*"]
    reminder: "eval() executes arbitrary strings — code injection risk. Refactor to use static logic or a safe sandbox (vm2, isolated-vm)."
