patterns:
  - rule_name: python_eval_exec
    regex: "\\beval\\s*\\(|\\bexec\\s*\\("
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**"]
    reminder: "eval()/exec() with user-controlled input enables arbitrary code execution. Replace with explicit logic, a whitelist dispatch map, or ast.literal_eval() for safe literal parsing only."

  - rule_name: python_shell_injection
    regex: "\\b(subprocess\\.call|subprocess\\.run|subprocess\\.Popen|os\\.system|os\\.popen)\\s*\\([^)]*shell\\s*=\\s*True|\\bos\\.system\\s*\\(|\\bos\\.popen\\s*\\("
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**"]
    reminder: "shell=True or os.system/os.popen with user input is a command-injection risk. Pass commands as a list (subprocess.run(['cmd', arg])) and never use shell=True with untrusted data."

  - rule_name: python_pickle_unsafe
    regex: "\\bpickle\\.loads?\\s*\\(|\\bpickle\\.load\\s*\\("
    paths: ["**/*.py"]
    reminder: "pickle.load/loads() on untrusted data enables arbitrary code execution during deserialization. Use JSON, MessagePack, or another safe format for untrusted input. If pickle is unavoidable, validate the source cryptographically before deserializing."

  - rule_name: python_yaml_unsafe_load
    regex: "\\byaml\\.load\\s*\\([^)]*(?!Loader\\s*=\\s*yaml\\.SafeLoader)[^)]*\\)"
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**"]
    reminder: "yaml.load() without SafeLoader executes arbitrary Python. Always use yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader)."

  - rule_name: python_hardcoded_secret
    regex: "(?i)(password|secret|api_?key|token|credential)\\s*=\\s*['\"][^'\"]{6,}['\"]"
    paths: ["**/*.py", "**/*.yaml", "**/*.yml", "**/*.env*", "**/*.toml"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**", "**/*.example", "**/*.sample"]
    reminder: "Hardcoded secret detected. Read credentials from environment variables (os.environ, python-decouple, pydantic-settings) or a secrets manager — never from source code."

  - rule_name: python_sql_string_interpolation
    regex: "(execute|executemany|raw|text)\\s*\\(\\s*[fF]['\"]|\\.(execute|executemany)\\s*\\([^)]*%\\s*[({]|\\.(execute|executemany)\\s*\\([^)]*\\.format\\s*\\("
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**"]
    reminder: "SQL string interpolation (f-strings, % formatting, .format()) risks injection. Use parameterized queries with placeholders: cursor.execute('SELECT ... WHERE id = %s', (id,)) or ORM query methods with bound parameters."
