patterns:
  - rule_name: python_app_tempfile_unsafe
    regex: "\\btempfile\\.mktemp\\s*\\("
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**"]
    reminder: "tempfile.mktemp() has a TOCTOU race condition — the file can be created by another process between the name generation and the open() call. Use tempfile.mkstemp() (returns fd + path) or tempfile.NamedTemporaryFile() instead."

  - rule_name: python_app_insecure_random
    regex: "\\brandom\\.(random|randint|choice|shuffle|sample)\\s*\\("
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**"]
    reminder: "random module uses a Mersenne Twister PRNG that is not cryptographically secure. For security-sensitive use (tokens, session IDs, CSRF nonces, passwords) use the secrets module: secrets.token_urlsafe(), secrets.token_bytes(), secrets.randbelow()."

  - rule_name: python_app_path_traversal
    regex: "open\\s*\\([^)]*(?:request|args|kwargs|params|user_input|getenv)[^)]*\\)"
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**"]
    reminder: "File open() with path derived from user input risks path traversal. Resolve the path with pathlib.Path.resolve() and verify it stays within the intended base directory: assert resolved_path.is_relative_to(base_dir)."

  - rule_name: python_app_debug_print
    regex: "^\\s*print\\s*\\([^)]*\\)"
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**", "**/test/**", "**/cli.py", "**/__main__.py"]
    reminder: "print() in application code is likely a debug statement. Use logging.getLogger(__name__).debug/info/warning/error() instead for structured, leveled, and controllable output."
