patterns:
  - rule_name: django_debug_true
    regex: "DEBUG\\s*=\\s*True"
    paths: ["**/settings*.py", "**/settings/**/*.py"]
    exclude_paths: ["**/settings/local.py", "**/settings/development.py", "**/settings/test*.py"]
    reminder: "DEBUG = True exposes stack traces and the interactive debugger. Set DEBUG = False in production settings and read the value from an environment variable: DEBUG = env.bool('DEBUG', default=False)."

  - rule_name: django_hardcoded_secret_key
    regex: "SECRET_KEY\\s*=\\s*['\"][^'\"]{10,}['\"]"
    paths: ["**/settings*.py", "**/settings/**/*.py"]
    exclude_paths: ["**/settings/local*.py", "**/settings/test*.py"]
    reminder: "Hardcoded SECRET_KEY in settings risks session forgery and CSRF bypass if the key leaks. Read from environment: SECRET_KEY = env('SECRET_KEY') using django-environ or python-decouple."

  - rule_name: django_mark_safe
    regex: "\\bmark_safe\\s*\\(|\\|\\s*safe\\b"
    paths: ["**/*.py", "**/*.html"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**"]
    reminder: "mark_safe() / |safe marks content as HTML-safe and bypasses Django's auto-escaping. Only use on content that has been explicitly sanitized (e.g., via bleach). Never pass user-controlled data directly."

  - rule_name: django_raw_sql
    regex: "\\.raw\\s*\\([^)]*[fF]['\"]|\\.extra\\s*\\([^)]*[fF]['\"]|\\.raw\\s*\\([^)]*%\\s*[({]|\\.extra\\s*\\([^)]*%\\s*[({]"
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**"]
    reminder: ".raw() and .extra() with f-strings or % formatting risks SQL injection. Use parameterized .raw('... WHERE id = %s', [id]) or prefer ORM methods — QuerySet.filter() is parameterized by default."

  - rule_name: django_csrf_exempt
    regex: "@csrf_exempt"
    paths: ["**/*.py"]
    exclude_paths: ["**/test_*.py", "**/*_test.py", "**/tests/**"]
    reminder: "@csrf_exempt disables CSRF protection on this view. This is only safe for stateless token-authenticated API endpoints (JWT, API key). Verify the view is not reachable via browser session authentication."

  - rule_name: django_allowed_hosts_wildcard
    regex: "ALLOWED_HOSTS\\s*=\\s*\\[\\s*['\"]\\*['\"]"
    paths: ["**/settings*.py", "**/settings/**/*.py"]
    exclude_paths: ["**/settings/local*.py", "**/settings/test*.py", "**/settings/development*.py"]
    reminder: "ALLOWED_HOSTS = ['*'] allows any HTTP Host header — enables Host header injection. Set to explicit hostnames in production: ALLOWED_HOSTS = ['myapp.example.com']."
